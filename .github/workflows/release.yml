name: Release

# Builds and publishes to PyPI when a version tag is pushed, e.g.:
#   git tag v0.1.1 && git push origin v0.1.1
#
# Uses PyPI **Trusted Publishing (OIDC)** — NO token, nothing to rotate, nothing
# expires. One-time setup: on PyPI, register this GitHub repo + `release.yml` as
# a Trusted Publisher for the project (Project → Settings → Publishing).
# Until that is configured, the publish step will fail; the build still runs.

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub release
  id-token: write # PyPI Trusted Publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - name: Build distribution
        run: uv build

      - name: Publish to PyPI (Trusted Publishing — tokenless)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
