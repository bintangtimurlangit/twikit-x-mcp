name: Release

# Builds the distribution and opens a GitHub release when a version tag is
# pushed, e.g.:  git tag v0.1.1 && git push origin v0.1.1
#
# The package is not on PyPI yet (it installs from GitHub). To enable PyPI
# publishing later, add a publish step (Trusted Publishing via OIDC, or
# `uv publish` with UV_PUBLISH_TOKEN).

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub release
  id-token: write # reserved for PyPI Trusted Publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - name: Build distribution
        run: uv build
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
