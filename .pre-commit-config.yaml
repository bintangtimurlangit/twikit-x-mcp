# Pre-commit hooks. Install once with:
#   pre-commit install && pre-commit install --hook-type commit-msg
#
# ruff/ruff-format only touch our code — the vendored twikit/ is excluded via
# [tool.ruff] extend-exclude in pyproject.toml.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.1.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
